        ctx.beginPath(); ctx.ellipse(x, y + 4 * s, 36 * s, 8 * s, 0, Math.PI, 0); ctx.stroke();
      }
      return;
    }
    if (t === 'mars') {
      if (o.v < .4) {                                   // arche rocheuse
        ctx.fillStyle = teinte;
        ctx.beginPath();
        ctx.moveTo(x - 28 * s, y); ctx.lineTo(x - 28 * s, y - 26 * s);
        ctx.quadraticCurveTo(x, y - 54 * s, x + 28 * s, y - 26 * s); ctx.lineTo(x + 28 * s, y);
        ctx.lineTo(x + 16 * s, y); ctx.lineTo(x + 16 * s, y - 24 * s);
        ctx.quadraticCurveTo(x, y - 40 * s, x - 16 * s, y - 24 * s); ctx.lineTo(x - 16 * s, y);
        ctx.closePath(); ctx.fill();
      } else if (o.v < .6) {                            // tourbillon de poussière
        ctx.globalAlpha = .22; ctx.fillStyle = '#e0a878';
        ctx.beginPath();
        const ph = performance.now() / 900 + o.t;
        ctx.moveTo(x - 3 * s, y);
        for (let k = 0; k <= 10; k++) ctx.lineTo(x + Math.sin(ph + k * .5) * (k * 1.6) * s - k * .6 * s, y - k * 7 * s);
        for (let k = 10; k >= 0; k--) ctx.lineTo(x + Math.sin(ph + k * .5) * (k * 1.6) * s + (k * .9 + 3) * s, y - k * 7 * s);
        ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
      } else {                                          // mesa
        ctx.fillStyle = clair; ctx.fillRect(x - 26 * s, y - 30 * s, 52 * s, 30 * s);
        ctx.fillStyle = teinte; ctx.fillRect(x + 6 * s, y - 30 * s, 20 * s, 30 * s);
        ctx.fillStyle = tresClair; ctx.fillRect(x - 26 * s, y - 33 * s, 52 * s, 3 * s);
      }
      return;
    }
  });
}

function colline(pts, p, couleur, dy, dec = 0, creteClair = null, contourBas = null) {
  ctx.fillStyle = couleur;
  ctx.beginPath(); ctx.moveTo(-70, VH + 70);
  for (const [x, y] of pts) {
    const sx = x - cam.x * p;
    if (sx < -90 || sx > VW + 90) continue;
    ctx.lineTo(sx, y + dy + dec);
  }
  ctx.lineTo(VW + 70, VH + 70); ctx.closePath(); ctx.fill();
  if (contourBas) { ctx.strokeStyle = contourBas; ctx.lineWidth = 4; ctx.stroke(); }
  if (creteClair) {
    ctx.strokeStyle = creteClair; ctx.lineWidth = 5; ctx.lineJoin = 'round';
    ctx.beginPath();
    let premier = true;
    for (const [x, y] of pts) {
      const sx = x - cam.x * p;
      if (sx < -90 || sx > VW + 90) continue;
      premier ? (ctx.moveTo(sx, y + dy + dec), premier = false) : ctx.lineTo(sx, y + dy + dec);
    }
    ctx.stroke();
  }
}
const voile = c => { ctx.fillStyle = c; ctx.fillRect(0, 0, VW, VH); };

// éclaircit (t>0) ou assombrit (t<0) une couleur hexadécimale
function ombrer(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  const f = v => Math.max(0, Math.min(255, Math.round(t > 0 ? v + (255 - v) * t : v * (1 + t))));
  return `rgb(${f(r)},${f(g)},${f(b)})`;
}

// ---- la végétation change selon le biome ----
function decorColline(p, dy) {
  buissons.forEach(b => {
    const x = b.x - cam.x * p, y = b.y + dy;
    if (x < -40 || x > VW + 40) return;
    ctx.fillStyle = ombrer(C.col2, -.2);
    ctx.beginPath();
    ctx.arc(x - b.r * .6, y, b.r * .7, 0, 7); ctx.arc(x + b.r * .6, y, b.r * .7, 0, 7); ctx.arc(x, y - b.r * .4, b.r, 0, 7);
    ctx.fill();
  });
  plantes.forEach(a => {
    const x = a.x - cam.x * p, y = a.y + dy;
    if (x < -60 || x > VW + 60) return;
    const bal = Math.sin(performance.now() / 900 + a.t) * 2;
    const tronc = ombrer(C.terre3, -.15), feuille = ombrer(C.col1, .1), feuille2 = ombrer(C.col1, .3);

    if (C.decor === 'rochers') {
      ctx.fillStyle = ombrer(C.roche, -.1); ctx.strokeStyle = ombrer(C.roche, -.5); ctx.lineWidth = 2.5;
      const r = a.l * .8;
      ctx.beginPath();
      ctx.moveTo(x - r, y); ctx.lineTo(x - r * .5, y - r * .9); ctx.lineTo(x + r * .4, y - r * .7);
      ctx.lineTo(x + r, y); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,.14)';
      ctx.beginPath(); ctx.moveTo(x - r * .5, y - r * .9); ctx.lineTo(x + r * .4, y - r * .7); ctx.lineTo(x, y - r * .3); ctx.closePath(); ctx.fill();
      return;
    }
    if (C.decor === 'cactus') {
      ctx.strokeStyle = ombrer(C.col1, -.3); ctx.lineWidth = 8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - a.h); ctx.stroke();
      ctx.strokeStyle = C.col1; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - a.h);
      if (a.v > .5) { ctx.moveTo(x, y - a.h * .6); ctx.lineTo(x - 10, y - a.h * .6); ctx.lineTo(x - 10, y - a.h * .85); }
      else { ctx.moveTo(x, y - a.h * .5); ctx.lineTo(x + 10, y - a.h * .5); ctx.lineTo(x + 10, y - a.h * .8); }
      ctx.stroke();
      return;
    }
    if (C.decor === 'sapins') {
      ctx.strokeStyle = tronc; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - a.h * .3); ctx.stroke();
      for (let i = 0; i < 3; i++) {
        const yy = y - a.h * .25 - i * a.h * .28, ll = a.l * (1 - i * .24);
        ctx.fillStyle = i === 2 ? feuille2 : feuille;
        ctx.beginPath(); ctx.moveTo(x + bal * (i / 3), yy - a.h * .34);
        ctx.lineTo(x - ll, yy); ctx.lineTo(x + ll, yy); ctx.closePath(); ctx.fill();
      }
      ctx.fillStyle = 'rgba(255,255,255,.5)';                 // neige sur les branches
      ctx.beginPath(); ctx.ellipse(x, y - a.h * .95, a.l * .3, 2.5, 0, 0, 7); ctx.fill();
      return;
    }
    if (C.decor === 'acacias') {
      ctx.strokeStyle = tronc; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x, y);
      ctx.lineTo(x + bal, y - a.h * .8);
      ctx.moveTo(x + bal * .5, y - a.h * .5); ctx.lineTo(x - 10, y - a.h * .75);
      ctx.moveTo(x + bal * .5, y - a.h * .5); ctx.lineTo(x + 12, y - a.h * .72);
      ctx.stroke();
      ctx.fillStyle = feuille;                               // parasol plat
      ctx.beginPath(); ctx.ellipse(x + bal, y - a.h * .92, a.l * 1.5, a.l * .38, 0, 0, 7); ctx.fill();
      ctx.fillStyle = feuille2;
      ctx.beginPath(); ctx.ellipse(x + bal - a.l * .3, y - a.h - a.l * .1, a.l * .8, a.l * .26, 0, 0, 7); ctx.fill();
      return;
    }
    if (C.decor === 'jungle') {
      ctx.strokeStyle = tronc; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x, y); ctx.quadraticCurveTo(x + bal * 2, y - a.h * .6, x + bal * 3, y - a.h); ctx.stroke();
      for (let i = 0; i < 6; i++) {                          // palmes
        const ang = -Math.PI / 2 + (i - 2.5) * .42;
        ctx.strokeStyle = i % 2 ? feuille : feuille2; ctx.lineWidth = 7;
        ctx.beginPath(); ctx.moveTo(x + bal * 3, y - a.h);
        ctx.quadraticCurveTo(x + bal * 3 + Math.cos(ang) * a.l, y - a.h + Math.sin(ang) * a.l,
                             x + bal * 3 + Math.cos(ang) * a.l * 1.7, y - a.h + Math.sin(ang) * a.l * 1.7 + 6);
        ctx.stroke();
      }
      return;
    }
    // arbre feuillu par défaut
    ctx.strokeStyle = tronc; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x, y); ctx.quadraticCurveTo(x + bal * .4, y - a.h * .6, x + bal, y - a.h); ctx.stroke();
    ctx.fillStyle = feuille;
    ctx.beginPath(); ctx.arc(x + bal, y - a.h - a.l * .3, a.l, 0, 7); ctx.fill();
    ctx.fillStyle = feuille2;
    ctx.beginPath(); ctx.arc(x + bal + a.l * .3, y - a.h - a.l * .5, a.l * .65, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.16)';
    ctx.beginPath(); ctx.arc(x + bal + a.l * .45, y - a.h - a.l * .6, a.l * .3, 0, 7); ctx.fill();
  });
}

function bloom() {
  const s = .5;
  bctx.setTransform(1, 0, 0, 1, 0, 0);
  bctx.clearRect(0, 0, bCan.width, bCan.height);
  bctx.setTransform(cam.z * s, 0, 0, cam.z * s, (VW / 2 - cam.x * cam.z) * s, (VH / 2 - cam.y * cam.z) * s);
  eclairs.forEach(e => {
    const k = e.vie / e.max;
    const g = bctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
    g.addColorStop(0, `rgba(255,252,220,${k})`); g.addColorStop(.4, `rgba(255,190,90,${k * .7})`);
    g.addColorStop(1, 'rgba(255,140,40,0)');
    bctx.fillStyle = g; bctx.beginPath(); bctx.arc(e.x, e.y, e.r, 0, 7); bctx.fill();
  });
  etincelles.forEach(p => {
    bctx.globalAlpha = Math.max(0, p.vie / p.max);
    bctx.fillStyle = p.terre ? '#8a6238' : (p.vie > .5 ? '#fff4c0' : '#ff9a3c');
    bctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  });
  bctx.globalAlpha = 1;
  projectiles.forEach(p => {
    if (p.type === 'grenade') return;
    const a = Math.atan2(p.vy, p.vx);
    const g = bctx.createRadialGradient(p.x - Math.cos(a) * 8, p.y - Math.sin(a) * 8, 0, p.x, p.y, 20);
    g.addColorStop(0, 'rgba(255,225,150,.9)'); g.addColorStop(1, 'rgba(255,120,40,0)');
    bctx.fillStyle = g; bctx.beginPath(); bctx.arc(p.x - Math.cos(a) * 8, p.y - Math.sin(a) * 8, 20, 0, 7); bctx.fill();
  });
  ecran();
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = C.moment === 'nuit' ? .8 : .55;   // la nuit, tout ce qui brille compte double
  if ('filter' in ctx) ctx.filter = 'blur(5px)';
  ctx.drawImage(bCan, 0, 0, VW, VH);
  ctx.filter = 'none';
  ctx.restore();
}

function cerne(dessin, remplir, lw = 3) {
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.strokeStyle = C.encre; ctx.lineWidth = lw;
  dessin(); ctx.stroke();
  ctx.fillStyle = remplir; dessin(); ctx.fill();
}
function etoile(x, y, r, remplir, trait) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = i * Math.PI / 5 - Math.PI / 2, rr = i % 2 ? r * .45 : r;
    i ? ctx.lineTo(x + Math.cos(a) * rr, y + Math.sin(a) * rr) : ctx.moveTo(x + Math.cos(a) * rr, y + Math.sin(a) * rr);
  }
  ctx.closePath();
  ctx.fillStyle = remplir; ctx.fill();
  if (trait) { ctx.strokeStyle = trait; ctx.lineWidth = 2; ctx.stroke(); }
}

function dessinerBoum(e) {
  const k = e.vie / e.max, r = e.r * (1.15 - k * .35);
  ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.tour);
  ctx.globalAlpha = Math.min(1, k * 1.6);
  const dents = () => {
    ctx.beginPath();
    for (let i = 0; i < e.branches * 2; i++) {
      const a = i * Math.PI / e.branches, rr = i % 2 ? r * .52 : r;
      i ? ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr) : ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath();
  };
  ctx.strokeStyle = C.encre; ctx.lineWidth = 4; ctx.lineJoin = 'round'; dents(); ctx.stroke();
  ctx.fillStyle = '#ff9d21'; dents(); ctx.fill();
  ctx.scale(.66, .66); ctx.fillStyle = '#ffd84d'; dents(); ctx.fill();
  ctx.scale(.55, .55); ctx.fillStyle = '#fffbe6'; dents(); ctx.fill();
  ctx.restore(); ctx.globalAlpha = 1;
}

// ---- accessoires : c'est ce qui distingue les six personnages ----
function dessinerChapeau(v, cx, cy, w, h, c) {
  const t = v.tete.chapeau, s = v.sens, top = cy - h / 2;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  if (t === 'casque') {
    cerne(() => { ctx.beginPath(); ctx.arc(cx, top + 3, w * .95, Math.PI, 0); ctx.closePath(); }, '#4a6b8a', 3);
    ctx.fillStyle = 'rgba(255,255,255,.3)';
    ctx.beginPath(); ctx.ellipse(cx - w * .3, top - w * .3, w * .25, w * .12, -.5, 0, 7); ctx.fill();
    cerne(() => { ctx.beginPath(); ctx.roundRect(cx - w * 1.05, top + 1, w * 2.1, 4, 2); }, '#35516b', 2.5);
  } else if (t === 'casquette') {
    cerne(() => { ctx.beginPath(); ctx.arc(cx, top + 4, w * .9, Math.PI, 0); ctx.closePath(); }, c, 3);
    cerne(() => { ctx.beginPath(); ctx.ellipse(cx + s * w * .75, top + 4, w * .8, 3.5, 0, 0, 7); }, '#e8e8e8', 2.5);
  } else if (t === 'antenne') {
    ctx.strokeStyle = C.encre; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx, top + 1); ctx.quadraticCurveTo(cx + 3, top - 12, cx + 7, top - 15); ctx.stroke();
    cerne(() => { ctx.beginPath(); ctx.arc(cx + 8, top - 17, 4, 0, 7); }, '#ffd84d', 2.5);
  } else if (t === 'cornes') {
    [-1, 1].forEach(d => cerne(() => {
      ctx.beginPath(); ctx.moveTo(cx + d * w * .55, top + 4);
      ctx.quadraticCurveTo(cx + d * w * 1.1, top - 6, cx + d * w * .75, top - 13);
      ctx.quadraticCurveTo(cx + d * w * .5, top - 5, cx + d * w * .25, top + 4);
      ctx.closePath();
    }, '#f0e2c0', 2.5));
  } else if (t === 'crete') {
    for (let i = -2; i <= 2; i++)
      cerne(() => {
        ctx.beginPath(); ctx.moveTo(cx + i * 3.5 - 2.4, top + 3);
        ctx.lineTo(cx + i * 3.5, top - 7 - Math.abs(2 - Math.abs(i)) * 3);
        ctx.lineTo(cx + i * 3.5 + 2.4, top + 3); ctx.closePath();
      }, '#ffb43c', 2);
  } else if (t === 'bandana') {
    cerne(() => { ctx.beginPath(); ctx.roundRect(cx - w * .95, top, w * 1.9, 6, 3); }, '#2e3f52', 2.5);
    cerne(() => {
      ctx.beginPath(); ctx.moveTo(cx - s * w * .9, top + 3);
      ctx.lineTo(cx - s * w * 1.5, top - 3); ctx.lineTo(cx - s * w * 1.45, top + 8); ctx.closePath();
    }, '#2e3f52', 2.5);
  }
}

function dessinerVer(v, T) {
  // un ver mort disparaît, sauf pendant son animation de K.O. qu'on laisse jouer
  if (v.pv <= 0 && v.reaction !== 'ko') return;
  const mechant = v.equipe === 1;
  const base = mechant ? ['#ff5252', '#ff7a3c', '#e0405f'] : ['#31c8e0', '#3ce0b0', '#4a9fe0'];
  const c = base[v.teinte];
  const c2 = ombrer(c, -.35);

  // ---- animation de réaction : décalages appliqués au corps et au visage ----
  let rDX = 0, rDY = 0, rRot = 0, rEtire = 0, expression = 'neutre';
  if (v.reaction) {
    const p = Math.min(1, v.reacT / v.reacDur);       // progression 0→1
    const amorti = Math.exp(-p * 4);                  // enveloppe qui retombe
    if (v.reaction === 'mal') {                        // petit tressaillement
      rDX = Math.sin(v.reacT * 42) * 3 * amorti;
      expression = 'mal';
    } else if (v.reaction === 'gros-mal') {            // secousse forte + recul
      rDX = Math.sin(v.reacT * 46) * 6 * amorti;
      rDY = -Math.sin(v.reacT * 20) * 3 * amorti;
      rRot = Math.sin(v.reacT * 30) * .18 * amorti;
      expression = 'sonne';
    } else if (v.reaction === 'ko') {                  // bascule et tombe à la renverse
      const q = Math.min(1, p * 1.6);
      rRot = -v.sens * q * 1.4;                        // pivote au sol
      rDY = Math.sin(p * Math.PI) * -6;
      expression = 'ko';
    } else if (v.reaction === 'triomphe') {            // petits bonds de joie
      rDY = -Math.abs(Math.sin(v.reacT * 9)) * 9 * (1 - p * .3);
      expression = 'joie';
    } else if (v.reaction === 'rate') {                // s'affaisse, dépité
      rEtire = -Math.sin(Math.min(p, .5) * Math.PI) * .22;
      rDY = Math.sin(Math.min(p, .5) * Math.PI) * 2;
      expression = 'depit';
    }
  }
  if (v.aouch > .5) expression = expression === 'neutre' ? 'mal' : expression;

  if (v.corde) {
    ctx.strokeStyle = C.encre; ctx.lineWidth = 3.4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(v.corde.ax, v.corde.ay); ctx.lineTo(v.x, v.y - 8); ctx.stroke();
    ctx.strokeStyle = '#e8dcbd'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(v.corde.ax, v.corde.ay); ctx.lineTo(v.x, v.y - 8); ctx.stroke();
    ctx.save(); ctx.translate(v.corde.ax, v.corde.ay);
    ctx.rotate(Math.atan2(v.y - 8 - v.corde.ay, v.x - v.corde.ax));
    cerne(() => { ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(4, -5); ctx.lineTo(4, 5); ctx.closePath(); }, '#b9c3cc', 2.5);
    ctx.restore();
  }

  const solY = sommet[Math.round(v.x)] > 0 ? sommet[Math.round(v.x)] : v.y;
  const haut = Math.max(0, Math.min(1, (solY - v.y) / 120));
  ctx.globalAlpha = .3 * (1 - haut);
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(v.x - LUM.x * 4, solY + 1, 10 + haut * 6, 3.4, 0, 0, 7); ctx.fill();
  ctx.globalAlpha = 1;

  const e = v.ecrase, [mw, mh] = v.tete.corps;
  const w = 8 * mw * (1 + e * .4 + rEtire), h = 17 * mh * (1 - e * .32 - rEtire);
  const resp = Math.sin(T * 2.2 + v.x) * .5;

  // On dessine corps + visage dans un repère animé, pivotant sur les pieds.
  ctx.save();
  ctx.translate(v.x + rDX, v.y + rDY);
  ctx.rotate(rRot);
  ctx.translate(-v.x, -v.y);
  const cy = v.y - h / 2 + resp;

  cerne(() => { ctx.beginPath(); ctx.ellipse(v.x, cy, w, h / 2, 0, 0, 7); }, c, 3.4);
  ctx.save();
  ctx.beginPath(); ctx.ellipse(v.x, cy, w, h / 2, 0, 0, 7); ctx.clip();
  ctx.fillStyle = c2; ctx.fillRect(v.x - w, cy + h * .1, w * 2, h);
  ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.beginPath(); ctx.ellipse(v.x + LUM.x * w * .4, cy - h * .28, w * .3, h * .16, -.5, 0, 7); ctx.fill();
  ctx.restore();

  const R = v.tete.oeil;
  const ox = v.x + v.sens * 2.4, oy = cy - h * .16;
  const s = v.sens;

  if (expression === 'ko' || expression === 'sonne') {
    // yeux en croix (K.O.) ou en spirale (sonné)
    ctx.strokeStyle = C.encre; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
    if (expression === 'ko') {
      [-1, 1].forEach(d => {
        const ex = v.x + d * 3.2;
        ctx.beginPath(); ctx.moveTo(ex - 2.4, oy - 2.4); ctx.lineTo(ex + 2.4, oy + 2.4);
        ctx.moveTo(ex + 2.4, oy - 2.4); ctx.lineTo(ex - 2.4, oy + 2.4); ctx.stroke();
      });
    } else {
      const ex = ox;
      ctx.beginPath();
      for (let a = 0; a < 10; a += .4) { const rr = a * .35; const px = ex + Math.cos(a) * rr, py = oy + Math.sin(a) * rr; a ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
      ctx.stroke();
    }
  } else {
    const clin = v.clin < .12 && expression === 'neutre';
    const grand = expression === 'joie' || expression === 'mal';   // yeux écarquillés
    const rr = clin ? 1.2 : R * (grand ? 1.15 : 1);
    cerne(() => { ctx.beginPath(); ctx.ellipse(ox, oy, R * (grand ? 1.1 : 1), rr, 0, 0, 7); }, '#fff', 2.4);
    if (!clin) {
      const regarde = expression === 'depit' ? .5 : 0;             // pupille basse quand dépité
      ctx.fillStyle = C.encre;
      ctx.beginPath(); ctx.arc(ox + v.sens * R * .34, oy + regarde * R, R * .44, 0, 7); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ox + v.sens * R * .2, oy - R * .28 + regarde * R, R * .17, 0, 7); ctx.fill();
    }
  }

  // sourcil : soit l'expression de réaction, soit le trait de caractère
  ctx.strokeStyle = C.encre; ctx.lineWidth = 2.6; ctx.lineCap = 'round';
  ctx.beginPath();
  if (expression === 'joie')       { ctx.moveTo(ox - s * R, oy - R - 4); ctx.quadraticCurveTo(ox, oy - R - 7, ox + s * R, oy - R - 4); }
  else if (expression === 'mal')   { ctx.moveTo(ox - s * R, oy - R - 4); ctx.lineTo(ox + s * R, oy - R + 1); }
  else if (expression === 'depit') { ctx.moveTo(ox - s * R, oy - R - 1); ctx.lineTo(ox + s * R, oy - R - 4); }
  else if (expression === 'neutre') {
    const sc = v.tete.sourcil;
    if (sc === 'furieux')      { ctx.moveTo(ox - s * R, oy - R - 2.5); ctx.lineTo(ox + s * R, oy - R + .5); }
    else if (sc === 'haut')    { ctx.moveTo(ox - s * R, oy - R - 3.5); ctx.lineTo(ox + s * R, oy - R - 4); }
    else if (sc === 'surpris') { ctx.moveTo(ox - s * R * .9, oy - R - 4); ctx.quadraticCurveTo(ox, oy - R - 6.5, ox + s * R * .9, oy - R - 4); }
    else if (sc === 'malin')   { ctx.moveTo(ox - s * R, oy - R - 1); ctx.lineTo(ox + s * R, oy - R - 4.5); }
    else                       { ctx.moveTo(ox - s * R, oy - R - 2.5); ctx.lineTo(ox + s * R, oy - R - 2.5); }
  }
  ctx.stroke();

  // bouche expressive selon la réaction
  if (expression !== 'neutre' && expression !== 'ko') {
    ctx.strokeStyle = C.encre; ctx.lineWidth = 2; ctx.lineCap = 'round';
    const my = oy + R + 3;
    ctx.beginPath();
    if (expression === 'joie')       ctx.arc(v.x, my - 1, 3, .1, Math.PI - .1);          // sourire
    else if (expression === 'depit') ctx.arc(v.x, my + 3, 3, Math.PI + .2, -.2);         // moue
    else { ctx.ellipse(v.x, my, 2.4, 2, 0, 0, 7); }                                       // bouche ronde (douleur)
    ctx.stroke();
  }

  dessinerChapeau(v, v.x, cy, w, h, c);
  ctx.restore();                                    // fin du repère animé

  // éclair blanc au moment de l'impact
  if (v.aouch > .01) {
    ctx.globalAlpha = v.aouch * .6;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(v.x + rDX, cy + rDY, w + 2, h / 2 + 2, rRot, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }

  if (v === actif && etat === 'visee') {
    const a = v.angle;
    ctx.save(); ctx.translate(v.x, cy + 1); ctx.rotate(Math.atan2(-Math.sin(a), Math.cos(a) * v.sens));
    cerne(() => { ctx.beginPath(); ctx.roundRect(3, -3, 18, 6, 3); }, '#5b6b7a', 2.6);
    ctx.restore();
  }

  const bx = v.x - 14, by = v.y - 32;
  ctx.fillStyle = C.encre; ctx.beginPath(); ctx.roundRect(bx - 1.5, by - 1.5, 31, 8, 4); ctx.fill();
  ctx.fillStyle = '#20303d'; ctx.beginPath(); ctx.roundRect(bx, by, 28, 5, 2.5); ctx.fill();
  ctx.fillStyle = v.pv > 50 ? '#6ddb6d' : v.pv > 25 ? '#ffc93c' : '#ff5252';
  ctx.beginPath(); ctx.roundRect(bx, by, 28 * v.pv / 100, 5, 2.5); ctx.fill();

  if (v === actif) {                              // nom du personnage actif
    ctx.font = '800 10px "Trebuchet MS",sans-serif'; ctx.textAlign = 'center';
    ctx.lineWidth = 3; ctx.strokeStyle = C.encre; ctx.lineJoin = 'round';
    ctx.strokeText(v.nom, v.x, by - 5); ctx.fillStyle = c; ctx.fillText(v.nom, v.x, by - 5);
    ctx.textAlign = 'left';
  }

  if (v === actif && etat === 'visee' && !ia) {
    ctx.strokeStyle = 'rgba(255,255,255,.75)'; ctx.setLineDash([3, 7]); ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(v.x, cy);
    ctx.lineTo(v.x + Math.cos(v.angle) * v.sens * 62, cy - Math.sin(v.angle) * 62); ctx.stroke();
    ctx.setLineDash([]);
    const rx = v.x + Math.cos(v.angle) * v.sens * 70, ry = cy - Math.sin(v.angle) * 70;
    ctx.strokeStyle = C.encre; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(rx, ry, 5.5, 0, 7); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(rx, ry, 5.5, 0, 7); ctx.stroke();
  }
  if (v === actif && puissance > 0) {
    ctx.fillStyle = C.encre; ctx.beginPath(); ctx.roundRect(v.x - 24, v.y - 48, 48, 10, 5); ctx.fill();
    const pg = ctx.createLinearGradient(v.x - 22, 0, v.x + 22, 0);
    pg.addColorStop(0, '#6ddb6d'); pg.addColorStop(.6, '#ffc93c'); pg.addColorStop(1, '#ff5252');
    ctx.fillStyle = pg; ctx.beginPath(); ctx.roundRect(v.x - 22, v.y - 46, 44 * puissance, 6, 3); ctx.fill();
  }
  if (v === actif && !ia) {
    const b = Math.sin(performance.now() / 220) * 3;
    cerne(() => {
      ctx.beginPath(); ctx.moveTo(v.x, v.y - 54 + b); ctx.lineTo(v.x - 6, v.y - 63 + b); ctx.lineTo(v.x + 6, v.y - 63 + b); ctx.closePath();
    }, c, 3);
  }
}

function dessinerCaisse(c, T) {
  if (!c.sol) {
    ctx.strokeStyle = C.encre; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(c.x - 9, c.y - 9); ctx.lineTo(c.x - 3, c.y - 24);
    ctx.moveTo(c.x + 9, c.y - 9); ctx.lineTo(c.x + 3, c.y - 24); ctx.stroke();
    cerne(() => { ctx.beginPath(); ctx.arc(c.x, c.y - 24, 19, Math.PI, 0); ctx.closePath(); },
      c.type === 'soin' ? '#f4f7f9' : '#ffd15c', 3);
    ctx.fillStyle = 'rgba(0,0,0,.10)';
    ctx.beginPath(); ctx.arc(c.x + 8, c.y - 24, 11, Math.PI, 0); ctx.fill();
  } else {
    ctx.globalAlpha = .25 + .25 * Math.sin(T * 3.4);
    ctx.fillStyle = c.type === 'soin' ? '#6ddb6d' : '#ffc93c';
    ctx.beginPath(); ctx.arc(c.x, c.y, 22, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }
  cerne(() => { ctx.beginPath(); ctx.roundRect(c.x - 10, c.y - 10, 20, 20, 3); }, '#c98d48', 3);
  ctx.strokeStyle = 'rgba(70,40,18,.5)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(c.x - 10, c.y - 10); ctx.lineTo(c.x + 10, c.y + 10);
  ctx.moveTo(c.x + 10, c.y - 10); ctx.lineTo(c.x - 10, c.y + 10); ctx.stroke();
  if (c.type === 'soin') {
    ctx.fillStyle = '#ff5252'; ctx.fillRect(c.x - 2, c.y - 7, 4, 14); ctx.fillRect(c.x - 7, c.y - 2, 14, 4);
  } else {
    const lettre = {grenade: 'G', mortier: 'M', sainte: '✝', foreuse: 'F'}[c.type] || '?';
    ctx.font = '800 12px "Trebuchet MS",sans-serif'; ctx.textAlign = 'center';
    ctx.lineWidth = 3; ctx.strokeStyle = C.encre; ctx.lineJoin = 'round';
    ctx.strokeText(lettre, c.x, c.y + 5);
    ctx.fillStyle = '#ffe27a'; ctx.fillText(lettre, c.x, c.y + 5);
    ctx.textAlign = 'left';
  }
}

function dessinerProjectile(p, T) {
  ctx.save(); ctx.translate(p.x, p.y);

  if (p.type === 'grenade') {
    ctx.rotate(T * 6);
    cerne(() => { ctx.beginPath(); ctx.arc(0, 0, 7, 0, 7); }, '#5f9e3a', 3);
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.beginPath(); ctx.arc(-2, -2.4, 2.4, 0, 7); ctx.fill();
    ctx.strokeStyle = C.encre; ctx.lineWidth = 2.6;
    ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(0, -11); ctx.stroke();
    if (Math.sin(performance.now() / 55) > 0) etoile(0, -13, 4, '#ffd84d', null);

  } else if (p.type === 'sainte') {           // grenade dorée, auréole scintillante
    ctx.rotate(T * 4);
    ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = .5 + .3 * Math.sin(T * 10);
    ctx.fillStyle = '#fff3b0'; ctx.beginPath(); ctx.arc(0, 0, 16, 0, 7); ctx.fill(); ctx.restore();
    cerne(() => { ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); }, '#ffd24d', 3);
    ctx.fillStyle = '#fff6c4';
    ctx.beginPath(); ctx.arc(-2.5, -3, 3, 0, 7); ctx.fill();
    ctx.strokeStyle = C.encre; ctx.lineWidth = 2;      // petite croix
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(0, 3); ctx.moveTo(-2.5, 0); ctx.lineTo(2.5, 0); ctx.stroke();
    ctx.fillStyle = '#e0a020'; ctx.beginPath(); ctx.arc(0, -10, 1.6, 0, 7); ctx.fill();

  } else if (p.type === 'foreuse') {          // vrille en rotation rapide
    ctx.rotate(Math.atan2(p.vy, p.vx));
    const sp = performance.now() / 22;
    cerne(() => { ctx.beginPath(); ctx.moveTo(11, 0); ctx.lineTo(-7, -5); ctx.lineTo(-7, 5); ctx.closePath(); }, '#9aa4ad', 2.6);
    ctx.strokeStyle = C.encre; ctx.lineWidth = 1.4;    // spires de la mèche
    for (let k = -6; k < 10; k += 3) {
      const ph = Math.sin(sp + k);
      ctx.beginPath(); ctx.moveTo(k, -4 * ph); ctx.lineTo(k + 1.5, 4 * ph); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(4, -1.5, 1.6, 0, 7); ctx.fill();

  } else {                                     // bazooka & mortier : l'obus classique
    ctx.rotate(Math.atan2(p.vy, p.vx));
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    const fl = 18 + Math.random() * 12;
    ctx.fillStyle = '#ffb43c';
    ctx.beginPath(); ctx.moveTo(-9, -4); ctx.lineTo(-9 - fl, 0); ctx.lineTo(-9, 4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff3c4';
    ctx.beginPath(); ctx.moveTo(-9, -2); ctx.lineTo(-9 - fl * .5, 0); ctx.lineTo(-9, 2); ctx.closePath(); ctx.fill();
    ctx.restore();
    cerne(() => { ctx.beginPath(); ctx.roundRect(-10, -4.5, 22, 9, 4.5); }, '#e9eef2', 3);
    ctx.fillStyle = p.type === 'mortier' ? '#6ddb6d' : '#ff5252';
    ctx.beginPath(); ctx.moveTo(6, -4.5); ctx.lineTo(12, 0); ctx.lineTo(6, 4.5); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function boussole() {
  if (!actif || etat === 'fini') return;
  const [x, y] = proj(actif.x, actif.y);
  if (x > 26 && x < VW - 26 && y > 26 && y < VH - 26) return;
  const cx = Math.max(28, Math.min(VW - 28, x)), cy = Math.max(28, Math.min(VH - 28, y));
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(Math.atan2(y - cy, x - cx));
  ctx.strokeStyle = C.encre; ctx.lineWidth = 4; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(13, 0); ctx.lineTo(-7, -8); ctx.lineTo(-7, 8); ctx.closePath(); ctx.stroke();
  ctx.fillStyle = equipeActive === 0 ? '#31c8e0' : '#ff5252'; ctx.fill();
  ctx.restore();
}

function banniereTour() {
  const k = Math.min(1, banniere / .4) * Math.min(1, (2.2 - banniere) / .25);
  const txt = ia ? actif.nom.toUpperCase() + ' · ORDINATEUR' : actif.nom.toUpperCase();
  const sous = (equipeActive === 0 ? 'BANGTI TEAM' : 'BAD GUYS') + ' — ' + C.nom.toUpperCase();
  const coul = equipeActive === 0 ? '#31c8e0' : '#ff5252';
  ecran();
  ctx.globalAlpha = k;
  ctx.fillStyle = 'rgba(20,32,43,.72)';
  ctx.beginPath(); ctx.roundRect(VW / 2 - 250, 88, 500, 68, 16); ctx.fill();
  ctx.strokeStyle = coul; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(VW / 2 - 250, 88, 500, 68, 16); ctx.stroke();
  ctx.textAlign = 'center';
  ctx.font = '800 24px "Trebuchet MS",sans-serif';
  ctx.lineWidth = 5; ctx.strokeStyle = C.encre; ctx.lineJoin = 'round';
  ctx.strokeText(txt, VW / 2, 120); ctx.fillStyle = '#fff'; ctx.fillText(txt, VW / 2, 120);
  ctx.font = '700 12px "Trebuchet MS",sans-serif';
  ctx.fillStyle = coul; ctx.fillText(sous, VW / 2, 142);
  ctx.textAlign = 'left'; ctx.globalAlpha = 1;
}

// =====================================================================
//  ENTRÉES
// =====================================================================
addEventListener('keydown', e => {
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) e.preventDefault();
  if (etat === 'fini') {                       // l'écran de victoire enchaîne sur Entrée
    if (e.key === 'Enter' && finT > .9) {
      if (gagnant === 0) nouvellePartie(niveau >= NIVEAUX.length - 1 ? 0 : niveau + 1);
      else nouvellePartie(niveau);
    }
    return;
  }
  if (etat !== 'visee' || ia) return;
  const n = parseInt(e.key, 10);                     // 1..5 sélectionnent directement dans ORDRE
  if (n >= 1 && n <= ORDRE.length && munitions(ORDRE[n - 1]) > 0) { arme = ORDRE[n - 1]; majHud(); }
  if (e.key === 'Enter' && actif.sol && !actif.corde) { actif.vy = -350; actif.vx = actif.sens * 120; actif.sol = false; Son.saut(); }
  if ((e.key === 'r' || e.key === 'R') && !e.repeat) basculerCorde();
  if (e.key === ' ' && !e.repeat) charge = true;
  entree[e.key] = true;
});
addEventListener('keyup', e => {
  entree[e.key] = false;
  if (e.key === ' ' && charge && etat === 'visee' && !ia) { puissance > .05 ? tirer() : (charge = false, puissance = 0); }
});

function basculerCorde() {
  if (etat !== 'visee' || ia || !actif || actif.pv <= 0) return;
  if (actif.corde) { actif.corde = null; dire('Corde larguée.'); } else lancerCorde(actif);
}

let drag = null;
cvs.addEventListener('pointerdown', e => {
  const r = cvs.getBoundingClientRect();
  drag = {x: e.clientX, y: e.clientY, cx: cam.cx, cy: cam.cy, k: (VW / r.width) / cam.z};
  cvs.setPointerCapture(e.pointerId);
});
cvs.addEventListener('pointermove', e => {
  if (!drag) return;
  const dx = (e.clientX - drag.x) * drag.k, dy = (e.clientY - drag.y) * drag.k;
  if (Math.hypot(dx, dy) > 6) libre = {x: drag.cx - dx, y: drag.cy - dy};
});
addEventListener('pointerup', () => drag = null);

const sel = document.getElementById('s-niveau');
NIVEAUX.forEach((n, i) => {
  const o = document.createElement('option');
  o.value = i;
  o.textContent = (i + 1) + '. ' + n.nom + ' — ' + n.moment + ' ' + ETOILES_DIFF(n.diff);
  sel.appendChild(o);
});
sel.addEventListener('change', () => nouvellePartie(+sel.value));
document.getElementById('b-suivant').addEventListener('click', () => nouvellePartie(niveau + 1));

const panneau = document.getElementById('tactile'), bTactile = document.getElementById('b-tactile');
const activerTactile = on => { panneau.classList.toggle('on', on); bTactile.style.color = on ? 'var(--cyan)' : ''; };
bTactile.addEventListener('click', () => activerTactile(!panneau.classList.contains('on')));
if (matchMedia('(pointer:coarse)').matches) activerTactile(true);

document.getElementById('b-corde').addEventListener('click', basculerCorde);
const bSolo = document.getElementById('b-solo');
bSolo.style.color = 'var(--cyan)';
bSolo.addEventListener('click', () => {
  solo = !solo;
  bSolo.textContent = 'Solo : ' + (solo ? 'oui' : 'non');
  bSolo.style.color = solo ? 'var(--cyan)' : '';
  dire(solo ? 'Les Bad Guys sont joués par l’ordinateur.' : 'Deux joueurs sur le même clavier.');
});

// Son : bouton de coupure + démarrage du contexte audio au premier geste.
const bSon = document.getElementById('b-son');
bSon.style.color = 'var(--cyan)';
bSon.addEventListener('click', () => {
  Son.actif = !Son.actif;
  bSon.textContent = Son.actif ? '🔊 Son' : '🔇 Muet';
  bSon.style.color = Son.actif ? 'var(--cyan)' : '';
  if (Son.actif) { Son.init(); Son.reprendre(); Son.clic(); }
});
const eveiller = () => { Son.init(); Son.reprendre(); };
addEventListener('keydown', eveiller, {once: true});
addEventListener('pointerdown', eveiller, {once: true});

document.querySelectorAll('.tche[data-t]').forEach(b => {
  const k = b.dataset.t;
  const on = e => {
    e.preventDefault(); if (etat !== 'visee' || ia) return;
    b.classList.add('presse');
    if (k === 'Enter') { if (actif.sol && !actif.corde) { actif.vy = -350; actif.vx = actif.sens * 120; actif.sol = false; Son.saut(); } }
    else entree[k] = true;
  };
  const off = () => { b.classList.remove('presse'); entree[k] = false; };
  b.addEventListener('pointerdown', on); b.addEventListener('pointerup', off);
  b.addEventListener('pointerleave', off); b.addEventListener('pointercancel', off);
});
const feu = document.getElementById('b-feu');
feu.addEventListener('pointerdown', e => { e.preventDefault(); if (etat === 'visee' && !ia) { charge = true; feu.classList.add('presse'); } });
const lacher = () => {
  feu.classList.remove('presse');
  if (charge && etat === 'visee' && !ia) { puissance > .05 ? tirer() : (charge = false, puissance = 0); }
};
feu.addEventListener('pointerup', lacher); feu.addEventListener('pointercancel', lacher);
document.getElementById('b-arme').addEventListener('click', () => {
  if (etat !== 'visee' || ia) return;
  for (let i = 1; i <= 3; i++) {
    const a = ORDRE[(ORDRE.indexOf(arme) + i) % 3];
    if (munitions(a) > 0) { arme = a; break; }
  }
  majHud();
});
document.getElementById('rejouer').addEventListener('click', () => nouvellePartie());

nouvellePartie(0);
requestAnimationFrame(boucle);
</script>
